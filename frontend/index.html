<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corpus Council</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Corpus Council</h1>

    <nav>
      <ul>
        <li><button data-tab="goals" aria-current="page">Goals</button></li>
        <li><button data-tab="files">Files</button></li>
        <li><button data-tab="admin">Admin</button></li>
      </ul>
    </nav>

    <!-- Goals Tab -->
    <section id="tab-goals">
      <h2>Goals</h2>

      <label for="goal-select">Goal</label>
      <select id="goal-select">
        <option value="">Loading goals...</option>
      </select>

      <label for="goals-user-id">User ID</label>
      <input id="goals-user-id" type="text" placeholder="User ID">

      <label for="goals-conversation-id">Conversation ID</label>
      <input id="goals-conversation-id" type="text" placeholder="Auto-populated on first send, or enter existing ID">

      <label for="goals-mode">Mode</label>
      <select id="goals-mode">
        <option value="">Default</option>
        <option value="sequential">Sequential</option>
        <option value="consolidated">Consolidated</option>
      </select>

      <div id="goals-history" style="max-height:400px; overflow-y:auto; border:1px solid #ccc; padding:0.5rem; margin-bottom:0.5rem;"></div>

      <label for="goals-input">Message</label>
      <textarea id="goals-input" placeholder="Type your message..."></textarea>

      <button id="goals-submit">Send</button>
    </section>

    <!-- Files Tab -->
    <section id="tab-files">
      <h2>Files</h2>
      <nav id="file-breadcrumb" aria-label="breadcrumb"></nav>

      <div id="file-tree"></div>

      <div id="file-editor" style="display:none">
        <textarea id="file-content"></textarea>
        <span id="unsaved-indicator" style="display:none">(unsaved)</span>
        <button id="file-save">Save</button>
        <button id="file-delete">Delete</button>
      </div>

      <details id="new-file-form">
        <summary>New file</summary>
        <input id="new-file-name" type="text" placeholder="filename.md">
        <button id="new-file-create">Create</button>
      </details>
    </section>

    <!-- Admin Tab -->
    <section id="tab-admin">
      <h2>Admin</h2>
      <label for="config-editor">Config (YAML)</label>
      <textarea id="config-editor"></textarea>
      <button id="config-save">Save Config</button>
      <button id="config-reload">Reload</button>

      <div role="group">
        <button id="btn-ingest">Ingest Corpus</button>
        <button id="btn-embed">Embed Corpus</button>
        <button id="btn-process-goals">Process Goals</button>
      </div>

      <div id="admin-output"></div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corpus Council</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="app-header">
      <h1 id="app-title">Goals — Corpus Council</h1>
      <button id="hamburger" aria-label="Open menu" aria-expanded="false">&#9776;</button>
    </div>

    <div id="menu-backdrop"></div>
    <nav id="hamburger-menu">
      <ul>
        <li><button data-tab="goals" aria-current="page">Goals</button></li>
        <li><button data-tab="files">Files</button></li>
        <li><button data-tab="admin">Admin</button></li>
      </ul>
    </nav>

    <!-- Goals Tab -->
    <section id="tab-goals">
      <div class="goals-layout">

        <!-- Left: conversation window -->
        <div class="goals-chat">
          <div id="goals-meta" class="goals-meta"></div>
          <div id="goals-history"></div>
          <div class="goals-input-row">
            <textarea id="goals-input" placeholder="Type your message..." rows="2"></textarea>
            <button id="goals-submit">Send</button>
          </div>
        </div>

        <!-- Right: conversation management -->
        <aside class="goals-sidebar">
          <div class="sidebar-section">
            <div class="sidebar-heading">
              <span>Conversations</span>
              <button id="goals-new-conv" title="New conversation">+</button>
            </div>
            <div id="new-conv-form" style="display:none">
              <label for="goal-select">Goal</label>
              <select id="goal-select"><option value="">Loading...</option></select>
              <label for="goals-user-id">User ID</label>
              <input id="goals-user-id" type="text" placeholder="User ID" value="test-user">
              <label for="goals-mode">Mode</label>
              <select id="goals-mode">
                <option value="">Default</option>
                <option value="sequential">Sequential</option>
                <option value="consolidated">Consolidated</option>
              </select>
            </div>
            <div id="goals-conv-list" class="conv-list"></div>
          </div>
        </aside>

      </div>
    </section>

    <!-- Files Tab -->
    <section id="tab-files">
      <nav id="file-breadcrumb" aria-label="breadcrumb"></nav>

      <div id="file-tree"></div>

      <div id="file-editor" style="display:none">
        <textarea id="file-content"></textarea>
        <span id="unsaved-indicator" style="display:none">(unsaved)</span>
        <button id="file-save">Save</button>
        <button id="file-delete">Delete</button>
      </div>

      <div id="new-item-row">
        <input id="new-file-name" type="text" placeholder="Name">
        <button id="new-file-create">Create File</button>
        <button id="new-folder-create">Create Folder</button>
      </div>
    </section>

    <!-- Admin Tab -->
    <section id="tab-admin">
      <h3>Actions</h3>
      <div role="group">
        <button id="btn-ingest">Ingest Corpus</button>
        <button id="btn-embed">Embed Corpus</button>
        <button id="btn-process-goals">Process Goals</button>
      </div>

      <div id="admin-output"></div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
